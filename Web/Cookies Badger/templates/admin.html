<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Badger Panel</title>
    <style>
      :root {
        --bg: #070a0f;
        --card: #111821;
        --text: #d7ffe8;
        --muted: #93a7b5;
        --ok: #34f08f;
        --nope: #ff5a74;
        --accent: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(
            circle at 85% 10%,
            rgba(139, 92, 246, 0.24),
            transparent 35%
          ),
          radial-gradient(
            circle at 5% 95%,
            rgba(52, 240, 143, 0.18),
            transparent 30%
          ),
          linear-gradient(170deg, #0c1219, #06090d 58%, #05070a);
      }

      .panel {
        width: min(700px, 100%);
        border-radius: 18px;
        background: linear-gradient(
          150deg,
          rgba(17, 24, 33, 0.95),
          rgba(9, 12, 17, 0.95)
        );
        border: 1px solid rgba(139, 92, 246, 0.35);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
        padding: 30px;
      }

      .badge {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 6px 12px;
        border-radius: 999px;
        background: #182430;
        color: #d1deea;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(1.55rem, 4vw, 2.2rem);
      }

      p {
        margin: 0 0 12px;
        line-height: 1.65;
        color: var(--muted);
      }

      .flag {
        margin-top: 14px;
        background: rgba(52, 240, 143, 0.08);
        border: 1px solid rgba(52, 240, 143, 0.4);
        color: var(--ok);
        border-radius: 12px;
        padding: 14px;
        font-family: Consolas, "Courier New", monospace;
        font-weight: 700;
        font-size: 1rem;
        word-break: break-word;
      }

      .denied {
        color: var(--nope);
        font-weight: 700;
        margin-top: 12px;
      }

      .back-link {
        display: inline-block;
        margin-top: 22px;
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(139, 92, 246, 0.45);
        border-radius: 10px;
        padding: 10px 14px;
        transition:
          background 0.15s ease,
          transform 0.15s ease;
      }

      .back-link:hover {
        background: rgba(139, 92, 246, 0.18);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="badge">ADMIN BADGER PANEL</div>

      {% if is_admin %}
      <h1>Access Granted</h1>
      <p>Welcome, Admin Badger. Sensitive den intel unlocked successfully.</p>
      <div class="flag">{{ flag }}</div>
      {% else %}
      <h1>Access Denied</h1>
      <p class="denied">
        Access Denied: Only the Admin Badger can view this page.
      </p>
      {% endif %}

      <a class="back-link" href="/">Return to Main Page</a>
    </main>
  </body>
</html>
