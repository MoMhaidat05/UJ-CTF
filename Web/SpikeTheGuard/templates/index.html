<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spike's Yard Ping</title>
    <style>
        :root {
            --spike-red: #d32f2f;
            --spike-dark-red: #b71c1c;
            --collar-gold: #ffd54f;
            --fence-wood: #8d6e63;
            --fence-dark: #5d4037;
            --grass-green: #81c784;
            --terminal-bg: #263238;
            --terminal-text: #69f0ae;
        }

        body {
            background-color: var(--grass-green);
            background-image: radial-gradient(#66bb6a 15%, transparent 16%),
                              radial-gradient(#66bb6a 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: #333;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #f5f5f5;
            border: 12px solid var(--spike-dark-red);
            border-radius: 30px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background-color: var(--collar-gold);
            border-radius: 50%;
            border: 5px solid #ffa000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .roof {
            position: absolute;
            top: -60px;
            left: -10px;
            right: -10px;
            height: 80px;
            background: repeating-linear-gradient(
                45deg,
                var(--fence-dark),
                var(--fence-dark) 20px,
                var(--fence-wood) 20px,
                var(--fence-wood) 40px
            );
            border-radius: 20px 20px 0 0;
            border: 5px solid #3e2723;
            z-index: -1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--spike-dark-red);
            font-size: 2.8rem;
            margin-top: -10px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px white, 5px 5px 0px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.25rem;
            color: #424242;
            font-weight: bold;
            line-height: 1.5;
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 3px dashed #bdbdbd;
        }

        .svg-icon {
            width: 120px;
            height: 120px;
            margin: -60px auto 10px auto;
            display: block;
            border-radius: 50%;
            background: #fff;
            border: 6px solid var(--spike-dark-red);
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .form-group {
            margin: 30px 0;
            position: relative;
        }

        input[type="text"] {
            padding: 15px 20px;
            width: calc(100% - 40px);
            border-radius: 15px;
            border: 4px solid var(--fence-wood);
            font-size: 18px;
            margin-bottom: 15px;
            font-family: inherit;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
            transition: border-color 0.3s, transform 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--spike-red);
            transform: scale(1.02);
        }

        button {
            padding: 15px 40px;
            background-color: var(--spike-dark-red);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            font-weight: 900;
            font-family: inherit;
            text-transform: uppercase;
            box-shadow: 0 6px 0px #7f0000, 0 10px 15px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #7f0000, 0 4px 5px rgba(0,0,0,0.2);
        }

        .output-box {
            margin-top: 30px;
            text-align: left;
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            border: 4px solid #1c2331;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            padding-top: 35px;
        }

        .output-box::before {
            content: "Spike-Term V1.0";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #1c2331;
            color: #ccc;
            padding: 5px 10px;
            font-size: 12px;
            font-family: sans-serif;
            font-weight: bold;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-bark {
            color: #ff5252;
            font-weight: bold;
            font-size: 1.4rem;
            animation: shake 0.5s;
            text-align: center;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="roof"></div>

        <svg class="svg-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="50" fill="#f5f5f5" />
            <path d="M 20 40 Q 10 20 30 20 Q 40 40 30 50 Z" fill="#5d4037" />
            <path d="M 80 40 Q 90 20 70 20 Q 60 40 70 50 Z" fill="#5d4037" />
            <ellipse cx="50" cy="55" rx="35" ry="30" fill="#8d6e63" />
            <ellipse cx="50" cy="70" rx="40" ry="25" fill="#f5f5f5" />
            <circle cx="35" cy="45" r="5" fill="#fff" />
            <circle cx="35" cy="45" r="2" fill="#000" />
            <circle cx="65" cy="45" r="5" fill="#fff" />
            <circle cx="65" cy="45" r="2" fill="#000" />
            <line x1="25" y1="35" x2="45" y2="40" stroke="#000" stroke-width="3" stroke-linecap="round" />
            <line x1="75" y1="35" x2="55" y2="40" stroke="#000" stroke-width="3" stroke-linecap="round" />
            <ellipse cx="50" cy="65" rx="8" ry="6" fill="#000" />
            <path d="M 35 75 Q 50 85 50 75 Q 50 85 65 75" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
            <rect x="25" y="85" width="50" height="15" rx="5" fill="#b71c1c" />
            <circle cx="50" cy="95" r="6" fill="#ffd54f" />
        </svg>

        <h1>Spike's Yard Ping</h1>
        <p>
            Test the yard's connection! But watch out, Spike the Bulldog is guarding
            the server and he <strong>HATES</strong> cats (especially Tom). ????
        </p>

        <form method="POST" action="/">
            <div class="form-group">
                <input
                    type="text"
                    name="ip"
                    placeholder="Enter IP Address (e.g., 127.0.0.1)"
                    required
                />
                <button type="submit">Ping Yard</button>
            </div>
        </form>

        {% if output %}
        <div class="output-box">
            {{ output|safe }}
        </div>
        {% endif %}
    </div>
</body>
</html>
